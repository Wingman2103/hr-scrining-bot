version: "3.9"

services:
  bot:
    build: .
    restart: always
    env_file:
      - .env
    volumes:
      - ./credentials:/app/credentials
    expose:
      - "8000"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - bot